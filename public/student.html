<!DOCTYPE html>
<html>

<head>

<title>Student Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
display:flex;
height:100vh;
background:#f1f5f9;
}

/* SIDEBAR */

.sidebar{

width:230px;
background:#1e293b;
color:white;
padding:25px;

}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{

width:100%;
margin-bottom:12px;
padding:10px;

border:none;
border-radius:6px;

background:#334155;
color:white;

cursor:pointer;
transition:0.2s;

}

.sidebar button:hover{
background:#475569;
}

/* MAIN */

.main{

flex:1;
padding:25px;
overflow:auto;

}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.header h1{
font-size:24px;
}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;

}

/* CARD */

.card{

background:white;
padding:20px;
border-radius:10px;

box-shadow:0 4px 10px rgba(0,0,0,0.08);

transition:0.2s;

}

.card:hover{
transform:translateY(-3px);
}

/* BUTTON */

.btn{

padding:8px 14px;

border:none;
border-radius:6px;

cursor:pointer;

font-size:14px;

margin-top:10px;

}

.apply{

background:#3b82f6;
color:white;

}

.apply:hover{
background:#2563eb;
}

/* NOTIFICATIONS */

.notification{

background:white;
padding:12px;

border-radius:6px;

margin-bottom:8px;

box-shadow:0 2px 6px rgba(0,0,0,0.05);

}

/* EMPTY */

.empty{
color:#64748b;
margin-top:10px;
}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>OD System</h2>

<button onclick="loadEvents()">Available Events</button>
<button onclick="loadNotifications()">Notifications</button>

<button onclick="logout()">Logout</button>

</div>


<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Student Dashboard</h1>

</div>


<!-- EVENTS -->

<h2>Available Events</h2>

<div class="grid" id="events"></div>

<br><br>

<!-- NOTIFICATIONS -->

<h2>Notifications</h2>

<div id="notifications"></div>

</div>


<script>
 
const role = localStorage.getItem("role")

if(role !== "student"){
alert("Access denied")
window.location = "login.html"
} 

const token = localStorage.getItem("token")


// ---------------- LOAD EVENTS ----------------

async function loadEvents(){

const res = await fetch("http://localhost:3000/api/student/events",{

headers:{
"Authorization":"Bearer "+token
}

})

const data = await res.json()

const container=document.getElementById("events")

container.innerHTML=""

if(data.length===0){

container.innerHTML="<p class='empty'>No events available</p>"
return

}

data.forEach(event=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<h3>${event.title}</h3>

<p><b>Date:</b> ${event.from_date}</p>

<button class="btn apply" onclick="applyOD(${event.id})">
Apply OD
</button>

`

container.appendChild(div)

})

}


// ---------------- APPLY OD ----------------

async function applyOD(eventId){

const date = prompt("Enter event date (YYYY-MM-DD)")

if(!date) return

const res = await fetch("http://localhost:3000/api/student/apply-od",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({
event_id:eventId,
applied_date:date
})

})

const data = await res.json()

alert(data.message)

}


// ---------------- NOTIFICATIONS ----------------

async function loadNotifications(){

const res = await fetch("http://localhost:3000/api/notifications/my-notifications",{

headers:{
"Authorization":"Bearer "+token
}

})

const data = await res.json()

const container=document.getElementById("notifications")

container.innerHTML=""

if(data.length===0){

container.innerHTML="<p class='empty'>No notifications</p>"
return

}

data.forEach(n=>{

const div=document.createElement("div")

div.className="notification"

div.innerText=n.message

container.appendChild(div)

})

}


// ---------------- LOGOUT ----------------

function logout(){

localStorage.clear()

window.location="login.html"

}


// LOAD EVENTS AUTOMATICALLY

loadEvents()

</script>

</body>

</html>
