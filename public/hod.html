<!DOCTYPE html>
<html>

<head>

<title>HOD Dashboard</title>
<script src="config.js"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, Arial;
}

body{
display:flex;
height:100vh;
background:#f1f5f9;
}

/* SIDEBAR */

.sidebar{

width:230px;
background:#1e293b;
color:white;
padding:25px;

}

.sidebar h2{
margin-bottom:30px;
}

.sidebar button{

width:100%;
margin-bottom:12px;
padding:10px;

border:none;
border-radius:6px;

background:#334155;
color:white;

cursor:pointer;
transition:0.2s;

}

.sidebar button:hover{
background:#475569;
}

/* MAIN */

.main{

flex:1;
padding:25px;
overflow:auto;

}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;

}

.header h1{
font-size:24px;
}

/* EVENT GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;

}

/* CARD */

.card{

background:white;
padding:20px;
border-radius:10px;

box-shadow:0 4px 10px rgba(0,0,0,0.08);

transition:0.2s;

}

.card:hover{
transform:translateY(-3px);
}

/* STATUS BADGE */

.badge{

display:inline-block;

padding:4px 10px;

border-radius:5px;

background:#fbbf24;

color:white;

font-size:12px;

margin-bottom:10px;

}

/* BUTTONS */

.btn{

padding:8px 14px;

border:none;
border-radius:6px;

cursor:pointer;

font-size:14px;

margin-right:6px;

}

.approve{

background:#10b981;
color:white;

}

.reject{

background:#ef4444;
color:white;

}

.btn:hover{
opacity:0.9;
}

/* INPUTS */

.actions{
display:flex;
gap:8px;
margin-top:10px;
flex-wrap:wrap;
}

.participants{
background:#3b82f6;
color:white;
}

/* EMPTY */

.empty{

color:#64748b;
font-size:18px;
margin-top:20px;

}

input{
padding:8px;
border-radius:6px;
border:1px solid #cbd5f5;
width:250px;
}

</style>

</head>

<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>OD System</h2>

<button onclick="loadEvents()">Pending Events</button>
<button onclick="showAttendancePanel()">Independent Attendance</button>
<button onclick="logout()">Logout</button>
</div>


<!-- MAIN -->

<div class="main">

<div class="header">
<h1>HOD Dashboard</h1>
<button class="btn approve" onclick="loadEvents()">Refresh</button>
</div>

<div class="grid" id="events"></div>

<div id="attendancePanel" style="display:none;margin-top:20px;">

<h2>Independent Attendance</h2>

<br>

<label>Event Title</label>
<br>
<input type="text" id="eventTitle" placeholder="Enter event name">

<br><br>

<label>From Date</label>
<br>
<input type="date" id="fromDate">

<br><br>

<label>To Date</label>
<br>
<input type="date" id="toDate">

<br><br>

<label>From Time</label>
<br>
<input type="time" id="fromTime">

<br><br>

<label>To Time</label>
<br>
<input type="time" id="toTime">

<br><br>

<label>Upload Student List (CSV)</label>
<br>
<input type="file" id="attendanceFile">

<br><br>

<button class="btn approve" onclick="uploadIndependentAttendance()">
Upload Attendance
</button>

</div>

</div>

<script>

const role = localStorage.getItem("role")

if(role !== "hod"){
alert("Access denied")
window.location = "login.html"
}

const token = localStorage.getItem("token")


async function fetchEvents(){

const res = await fetch(API_BASE + "/api/events/pending",{

headers:{
"Authorization":"Bearer "+token
}

})

const data = await res.json()

const container=document.getElementById("events")

container.innerHTML=""

if(data.length===0){

container.innerHTML="<p class='empty'>No pending events</p>"
return

}

data.forEach(event=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<span class="badge">Pending Approval</span>

<h3>${event.title}</h3>

<p><b>Date:</b> ${new Date(event.from_date).toLocaleString('en-IN')}</p>

<p><b>Club:</b> ${event.club_name || "Independent Event"}</p>

<br>

<div class="actions">

<button class="btn approve" onclick="approve(${event.id})">
Approve
</button>

<button class="btn reject" onclick="reject(${event.id})">
Reject
</button>

<button class="btn participants" onclick="viewParticipants(${event.id})">
Participants
</button>

</div>

<br>


`

container.appendChild(div)

})

}


async function approve(id){

await fetch(API_BASE + "/api/events/approve",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({event_id:id})

})

loadEvents()

}


async function reject(id){

await fetch(API_BASE + "/api/events/reject",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({event_id:id})

})

loadEvents()

}

async function viewParticipants(eventId){

try{

const res = await fetch(
API_BASE + "/api/participants/event/" + eventId,
{
headers:{
"Authorization":"Bearer "+token
}
}
)

// 🔥 SAFETY START
const text = await res.text();

let data;

try{
data = JSON.parse(text);
}catch(e){
console.error("❌ Not JSON:", text);
alert("Server error or wrong API URL");
return;
}

if(!res.ok){
console.error("❌ API ERROR:", data);
alert(data.message || "Failed to load participants");
return;
}
// 🔥 SAFETY END


let html="<h2>Participants</h2>"

html+="<table border='1' cellpadding='10'>"
html+="<tr><th>Student ID</th><th>Scan Time</th></tr>"

if(!Array.isArray(data) || data.length === 0){

html+=`
<tr>
<td colspan="2">No participants yet</td>
</tr>
`

}
else{

data.forEach(p=>{
html+=`
<tr>
<td>${p.student_id}</td>
<td>${p.scan_time ? new Date(p.scan_time).toLocaleString('en-IN') : '-'}</td>
</tr>
`
})

}

html+="</table>"

const win = window.open("", "_blank")
win.document.write(html)

}catch(err){

console.error("❌ FETCH ERROR:", err)
alert("Failed to load participants")

}

}

/* Attendance Upload */


function showAttendancePanel(){

document.getElementById("events").style.display="none"
document.getElementById("attendancePanel").style.display="block"

}

function loadEvents(){

document.getElementById("attendancePanel").style.display="none"
document.getElementById("events").style.display="grid"

fetchEvents()

}


async function uploadIndependentAttendance(){

const title = document.getElementById("eventTitle").value
const fromDate = document.getElementById("fromDate").value
const toDate = document.getElementById("toDate").value
const fromTime = document.getElementById("fromTime").value
const toTime = document.getElementById("toTime").value
const file = document.getElementById("attendanceFile").files[0]

const formData = new FormData()

formData.append("title",title)
formData.append("from_date",fromDate)
formData.append("to_date",toDate)
formData.append("from_time",fromTime)
formData.append("to_time",toTime)
formData.append("file",file)

const res = await fetch(
API_BASE + "/api/hod/independent-attendance",
{
method:"POST",
headers:{
"Authorization":"Bearer "+token
},
body:formData
})

const data = await res.json()

alert(data.message)

}


function logout(){

localStorage.clear()

window.location="login.html"

}


loadEvents()

</script>

</body>
</html>
